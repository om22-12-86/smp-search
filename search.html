<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск товаров SMP-Laptops</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); padding: 16px; padding-bottom: 80px; }
        .search-box { display: flex; gap: 8px; background: var(--tg-theme-secondary-bg-color, #f0f0f0); border-radius: 12px; padding: 8px 16px; margin-bottom: 12px; }
        .search-box input { flex: 1; border: none; outline: none; font-size: 16px; background: transparent; }
        .search-box button { background: var(--tg-theme-button-color, #2b82d6); border: none; border-radius: 8px; padding: 8px 20px; color: white; font-weight: 600; cursor: pointer; }
        .filters { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 8px; }
        .filter-chip { background: var(--tg-theme-secondary-bg-color, #f0f0f0); padding: 6px 14px; border-radius: 20px; font-size: 12px; white-space: nowrap; cursor: pointer; }
        .filter-chip.active { background: var(--tg-theme-button-color, #2b82d6); color: white; }
        .product-card { background: var(--tg-theme-secondary-bg-color, #f0f0f0); border-radius: 12px; padding: 12px; margin-bottom: 12px; cursor: pointer; transition: transform 0.1s; }
        .product-card:active { transform: scale(0.98); }
        .product-name { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
        .product-price { color: var(--tg-theme-button-color, #2b82d6); font-weight: 700; font-size: 16px; }
        .product-article { font-size: 12px; color: var(--tg-theme-hint-color, #666); margin-top: 4px; }
        .loading, .error { text-align: center; padding: 40px; }
        .error { color: red; }
        .stats { text-align: center; margin-top: 16px; font-size: 12px; color: var(--tg-theme-hint-color, #666); }
    </style>
</head>
<body>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Поиск по названию, бренду или артикулу..." autocomplete="off">
        <button onclick="searchProducts()">🔍</button>
    </div>
    <div class="filters" id="filters"></div>
    <div class="products-list" id="productsList"></div>
    <div id="stats"></div>

    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();
        WebApp.expand();
        
        let allProducts = [];
        let currentFilter = 'all';
        
        // API URL - будем пробовать несколько вариантов
        const API_URLS = [
            'https://knock-civil-threshold-operating.trycloudflare.com/products?v=1780826027',
            'https://knock-civil-threshold-operating.trycloudflare.com/products?v=1780826027',
            'https://knock-civil-threshold-operating.trycloudflare.com/products?v=1780826027'
        ];
        
        async function loadProducts() {
            const container = document.getElementById('productsList');
            container.innerHTML = '<div class="loading">📡 Загрузка товаров...</div>';
            
            for (const url of API_URLS) {
                try {
                    console.log('Пробуем:', url);
                    const res = await fetch(url);
                    if (res.ok) {
                        allProducts = await res.json();
                        console.log(`✅ Загружено ${allProducts.length} товаров с ${url}`);
                        renderFilters();
                        searchProducts();
                        return;
                    }
                } catch(e) {
                    console.log('❌ Ошибка:', url);
                }
            }
            
            container.innerHTML = '<div class="error">❌ Ошибка загрузки товаров</div>';
        }
        
        function renderFilters() {
            const cats = [...new Set(allProducts.map(p => p.subcategory || 'Другие'))];
            let html = `<div class="filter-chip active" onclick="setFilter('all')">Все (${allProducts.length})</div>`;
            cats.forEach(cat => {
                const count = allProducts.filter(p => p.subcategory === cat).length;
                html += `<div class="filter-chip" onclick="setFilter('${cat.replace(/'/g, "\\'")}')">${cat} (${count})</div>`;
            });
            document.getElementById('filters').innerHTML = html;
        }
        
        function setFilter(cat) {
            currentFilter = cat;
            document.querySelectorAll('.filter-chip').forEach(el => {
                const isActive = el.innerText.startsWith(cat === 'all' ? 'Все' : cat);
                if (isActive) el.classList.add('active');
                else el.classList.remove('active');
            });
            searchProducts();
        }
        
        function searchProducts() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            let filtered = allProducts;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(p => p.subcategory === currentFilter);
            }
            if (q) {
                filtered = filtered.filter(p =>
                    (p.name || '').toLowerCase().includes(q) ||
                    (p.brand || '').toLowerCase().includes(q) ||
                    (p.article || '').toLowerCase().includes(q)
                );
            }
            
            displayProducts(filtered);
        }
        
        function displayProducts(products) {
            const container = document.getElementById('productsList');
            if (!products.length) {
                container.innerHTML = '<div class="loading">🔍 Ничего не найдено</div>';
                document.getElementById('stats').innerHTML = '';
                return;
            }
            
            container.innerHTML = products.map(p => `
                <div class="product-card" onclick='openCard(${JSON.stringify(p).replace(/'/g, "\\'")})'>
                    <div class="product-name">${escapeHtml(p.name || 'Без названия')}</div>
                    <div class="product-price">${formatPrice(p.price)} ₽</div>
                    <div class="product-article">Артикул: ${p.article || '—'} • ${escapeHtml(p.brand || 'Другие')}</div>
                </div>
            `).join('');
            document.getElementById('stats').innerHTML = `<div class="stats">📦 Найдено: ${products.length} из ${allProducts.length} товаров</div>`;
        }
        
        function formatPrice(price) {
            const num = parseInt(String(price || '0').replace(/[^0-9]/g, ''));
            return isNaN(num) ? price : num.toLocaleString('ru-RU');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function openCard(product) {
            const data = btoa(unescape(encodeURIComponent(JSON.stringify(product))));
            WebApp.openLink(`https://om22-12-86.github.io/smp-search/index.html?v=2https://om22-12-86.github.io/smp-search/index.html?data=data=${encodeURIComponent(data)}`);
        }
        
        document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') searchProducts(); });
        loadProducts();
    </script>
</body>
</html>
