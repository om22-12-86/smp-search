<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Поиск товаров SMP-Laptops</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            padding-bottom: 80px;
        }
        .search-container { position: sticky; top: 0; background: var(--tg-theme-bg-color, #ffffff); padding: 12px 0; z-index: 100; }
        .search-box { display: flex; gap: 8px; background: var(--tg-theme-secondary-bg-color, #f0f0f0); border-radius: 12px; padding: 8px 16px; }
        .search-box input { flex: 1; border: none; outline: none; font-size: 16px; background: transparent; color: var(--tg-theme-text-color, #000000); }
        .search-box button { background: var(--tg-theme-button-color, #2b82d6); border: none; border-radius: 8px; padding: 8px 20px; color: white; font-weight: 600; cursor: pointer; }
        .filters { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 8px; }
        .filter-chip { background: var(--tg-theme-secondary-bg-color, #f0f0f0); padding: 6px 14px; border-radius: 20px; font-size: 12px; white-space: nowrap; cursor: pointer; }
        .filter-chip.active { background: var(--tg-theme-button-color, #2b82d6); color: white; }
        .products-list { margin-top: 16px; }
        .product-card { background: var(--tg-theme-secondary-bg-color, #f0f0f0); border-radius: 12px; padding: 12px; margin-bottom: 12px; cursor: pointer; transition: opacity 0.2s; }
        .product-card:active { opacity: 0.7; }
        .product-name { font-weight: 600; font-size: 14px; margin-bottom: 6px; line-height: 1.3; }
        .product-price { color: var(--tg-theme-button-color, #2b82d6); font-weight: 700; font-size: 16px; margin-bottom: 6px; }
        .product-article, .product-subcategory { color: var(--tg-theme-hint-color, #666666); font-size: 11px; margin-top: 4px; }
        .loading, .no-results, .error { text-align: center; padding: 40px; color: var(--tg-theme-hint-color, #666666); }
        .error { color: #ff3b30; }
        .stats { font-size: 12px; text-align: center; position: fixed; bottom: 0; left: 0; right: 0; background: var(--tg-theme-bg-color, #ffffff); padding: 12px; border-top: 1px solid #e0e0e0; }
    </style>
</head>
<body>
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск по названию, бренду или артикулу..." autocomplete="off">
            <button onclick="searchProducts()">🔍 Найти</button>
        </div>
        <div class="filters" id="filters"></div>
    </div>
    <div class="products-list" id="productsList">
        <div class="loading">📦 Загрузка товаров...</div>
    </div>
    <div class="stats" id="stats"></div>

    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();
        WebApp.expand();
        const BOT_USERNAME = 'BotWork1_bot';
        const CARD_BASE_URL = 'https://om22-12-86.github.io/smp-search/index.html';

        let allProducts = [];
        let currentSubcategory = 'all';
        let uniqueSubcategories = [];

        // Данные из Google Sheets
        const productsData = [
            {"name": "ASUS Vivobook 14 Pro 14\" 2880x1800 3K OLED Intel Core Ultra 7 258V 32GB/1TB", "article": "S5406S", "brand": "ASUS", "price": "134990", "subcategory": "Ультрабуки"},
            {"name": "ASUS ROG Strix G16 16\" 2560x1600 240Hz Ryzen 9 9955HX 32GB/1TB RTX 5070 Ti", "article": "G614FR-ES96", "brand": "ASUS", "price": "259990", "subcategory": "Игровые ноутбуки"},
            {"name": "ASUS X1504VA-BQ5273 15.6\" Intel Core 5 120U 16GB/512GB", "article": "X1504VA-BQ5273", "brand": "ASUS", "price": "57990", "subcategory": "Для офиса и учёбы"},
            {"name": "ASUS Zenbook 14 UX3406K Ryzen AI 7 32GB/1TB", "article": "UM3406KA", "brand": "ASUS", "price": "129990", "subcategory": "Ультрабуки"}
        ];

        function loadProducts() {
            allProducts = productsData;
            console.log('✅ Загружено товаров:', allProducts.length);
            
            if (allProducts.length === 0) {
                document.getElementById('productsList').innerHTML = '<div class="error">📭 Товары не найдены</div>';
                return;
            }
            
            uniqueSubcategories = [...new Set(allProducts.map(p => p.subcategory))];
            const filtersDiv = document.getElementById('filters');
            filtersDiv.innerHTML = '<div class="filter-chip active" onclick="setFilter(\'all\')">📦 Все категории</div>';
            uniqueSubcategories.forEach(cat => {
                filtersDiv.innerHTML += '<div class="filter-chip" onclick="setFilter(\'' + cat.replace(/'/g, '\\\'') + '\')">' + cat + '</div>';
            });
            searchProducts();
        }

        function setFilter(category) {
            currentSubcategory = category;
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.remove('active');
                if (chip.innerText === (category === 'all' ? '📦 Все категории' : category)) {
                    chip.classList.add('active');
                }
            });
            searchProducts();
        }

        function searchProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            let filtered = [...allProducts];
            if (currentSubcategory !== 'all') {
                filtered = filtered.filter(p => p.subcategory === currentSubcategory);
            }
            if (query) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(query) || p.brand.toLowerCase().includes(query) || p.article.includes(query));
            }
            displayProducts(filtered);
            document.getElementById('stats').innerHTML = '🔍 Найдено: ' + filtered.length + ' товаров из ' + allProducts.length;
        }

        function formatPrice(price) { 
            const p = parseInt(price); 
            return isNaN(p) ? price : p.toLocaleString('ru-RU') + ' ₽'; 
        }

        function openProductCard(article, name, brand, price, subcategory) {
            const productData = { name: name, article: article, brand: brand, price: price, subcategory: subcategory };
            const jsonStr = JSON.stringify(productData);
            const encodedData = btoa(unescape(encodeURIComponent(jsonStr)));
            const cardUrl = CARD_BASE_URL + '?data=' + encodeURIComponent(encodedData);
            WebApp.openLink(cardUrl);
        }

        function displayProducts(products) {
            const container = document.getElementById('productsList');
            if (products.length === 0) { 
                container.innerHTML = '<div class="no-results">😔 Товары не найдены</div>'; 
                return; 
            }
            container.innerHTML = '';
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => openProductCard(p.article, p.name, p.brand, p.price, p.subcategory);
                card.innerHTML = '<div class="product-name">' + escapeHtml(p.name.substring(0, 100)) + '</div>' +
                    '<div class="product-price">' + formatPrice(p.price) + '</div>' +
                    '<div class="product-article">🔢 Артикул: ' + p.article + '</div>' +
                    '<div class="product-article">🏷 Бренд: ' + p.brand + '</div>' +
                    '<div class="product-subcategory">📂 ' + p.subcategory + '</div>';
                container.appendChild(card);
            });
        }

        function escapeHtml(text) { 
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) { 
            if (e.key === 'Enter') searchProducts(); 
        });
        
        loadProducts();
    </script>
</body>
</html>
