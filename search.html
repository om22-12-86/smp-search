<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Поиск товаров SMP-Laptops</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            padding-bottom: 80px;
        }
        .search-container { position: sticky; top: 0; background: var(--tg-theme-bg-color, #ffffff); padding: 12px 0; z-index: 100; }
        .search-box { display: flex; gap: 8px; background: var(--tg-theme-secondary-bg-color, #f0f0f0); border-radius: 12px; padding: 8px 16px; }
        .search-box input { flex: 1; border: none; outline: none; font-size: 16px; background: transparent; color: var(--tg-theme-text-color, #000000); }
        .search-box button { background: var(--tg-theme-button-color, #2b82d6); border: none; border-radius: 8px; padding: 8px 20px; color: white; font-weight: 600; cursor: pointer; }
        .filters { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 8px; }
        .filter-chip { background: var(--tg-theme-secondary-bg-color, #f0f0f0); padding: 6px 14px; border-radius: 20px; font-size: 12px; white-space: nowrap; cursor: pointer; }
        .filter-chip.active { background: var(--tg-theme-button-color, #2b82d6); color: white; }
        .products-list { margin-top: 16px; }
        .product-card { background: var(--tg-theme-secondary-bg-color, #f0f0f0); border-radius: 12px; padding: 12px; margin-bottom: 12px; cursor: pointer; transition: opacity 0.2s; }
        .product-card:active { opacity: 0.7; }
        .product-name { font-weight: 600; font-size: 14px; margin-bottom: 6px; line-height: 1.3; }
        .product-price { color: var(--tg-theme-button-color, #2b82d6); font-weight: 700; font-size: 16px; margin-bottom: 6px; }
        .product-article, .product-subcategory { color: var(--tg-theme-hint-color, #666666); font-size: 11px; margin-top: 4px; }
        .loading, .no-results, .error { text-align: center; padding: 40px; color: var(--tg-theme-hint-color, #666666); }
        .error { color: #ff3b30; }
        .stats { font-size: 12px; text-align: center; position: fixed; bottom: 0; left: 0; right: 0; background: var(--tg-theme-bg-color, #ffffff); padding: 12px; border-top: 1px solid #e0e0e0; }
    </style>
</head>
<body>
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск по названию, бренду или артикулу..." autocomplete="off">
            <button onclick="searchProducts()">🔍 Найти</button>
        </div>
        <div class="filters" id="filters"></div>
    </div>
    <div class="products-list" id="productsList">
        <div class="loading">📦 Загрузка товаров...</div>
    </div>
    <div class="stats" id="stats"></div>

    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();
        WebApp.expand();
        const BOT_USERNAME = 'BotWork1_bot';
        const CARD_BASE_URL = 'https://om22-12-86.github.io/smp-search/index.html';

        let allProducts = [];
        let currentSubcategory = 'all';
        let uniqueSubcategories = [];

        const productsData = [
            {name: "ASUS Vivobook 14 Pro", article: "S5406S", brand: "ASUS", price: "134990", subcategory: "Ультрабуки"},
            {name: "ASUS ROG Strix G16", article: "G614FR-ES96", brand: "ASUS", price: "259990", subcategory: "Игровые ноутбуки"},
            {name: "Lenovo Legion Pro 5", article: "83F2002CUS", brand: "Lenovo", price: "219990", subcategory: "Игровые ноутбуки"},
            {name: "MSI Katana 15 HX", article: "B14WGK-293", brand: "MSI", price: "159990", subcategory: "Игровые ноутбуки"},
            {name: "HP OMEN 16 MAX", article: "HP-OMEN-16-MAX", brand: "HP", price: "179990", subcategory: "Игровые ноутбуки"},
            {name: "Dell Alienware 16", article: "AA16250", brand: "Dell", price: "229990", subcategory: "Игровые ноутбуки"},
            {name: "Apple MacBook Pro", article: "MBP16-2025", brand: "Apple", price: "249990", subcategory: "Ультрабуки"},
            {name: "Microsoft Surface Laptop", article: "SL7-2025", brand: "Microsoft", price: "149990", subcategory: "Ультрабуки"},
            {name: "Xbox Wireless Controller", article: "QAU-00021", brand: "Microsoft", price: "5990", subcategory: "Аксессуары"},
            {name: "Google Pixel 10", article: "Google-Pixel-10", brand: "Google", price: "79990", subcategory: "Смартфоны"},
            {name: "Garmin Fenix 8", article: "Garmin-Fenix-8-51", brand: "Garmin", price: "89990", subcategory: "Смарт-часы"},
            {name: "Meta Quest 3S", article: "Meta-Quest-3S-256", brand: "Meta", price: "39990", subcategory: "VR-гарнитуры"},
            {name: "Bose QuietComfort", article: "Bose-QC-White", brand: "Bose", price: "32990", subcategory: "Наушники"}
        ];

        function loadProducts() {
            allProducts = productsData;
            console.log("Loaded: " + allProducts.length);
            
            var cats = {};
            for (var i = 0; i < allProducts.length; i++) {
                cats[allProducts[i].subcategory] = true;
            }
            uniqueSubcategories = Object.keys(cats);
            
            var filtersDiv = document.getElementById("filters");
            filtersDiv.innerHTML = '<div class="filter-chip active" onclick="setFilter(\'all\')">📦 Все категории</div>';
            for (var i = 0; i < uniqueSubcategories.length; i++) {
                filtersDiv.innerHTML += '<div class="filter-chip" onclick="setFilter(\'' + uniqueSubcategories[i] + '\')">' + uniqueSubcategories[i] + '</div>';
            }
            
            searchProducts();
        }

        function setFilter(category) {
            currentSubcategory = category;
            var chips = document.querySelectorAll(".filter-chip");
            for (var i = 0; i < chips.length; i++) {
                chips[i].classList.remove("active");
                if (chips[i].innerText === (category === "all" ? "📦 Все категории" : category)) {
                    chips[i].classList.add("active");
                }
            }
            searchProducts();
        }

        function searchProducts() {
            var query = document.getElementById("searchInput").value.toLowerCase();
            var filtered = [];
            for (var i = 0; i < allProducts.length; i++) {
                var p = allProducts[i];
                if (currentSubcategory !== "all" && p.subcategory !== currentSubcategory) continue;
                if (query && !p.name.toLowerCase().includes(query) && !p.brand.toLowerCase().includes(query) && !p.article.includes(query)) continue;
                filtered.push(p);
            }
            displayProducts(filtered);
            document.getElementById("stats").innerHTML = "🔍 Найдено: " + filtered.length + " товаров из " + allProducts.length;
        }

        function formatPrice(price) {
            var p = parseInt(price);
            return isNaN(p) ? price : p.toLocaleString("ru-RU") + " ₽";
        }

        function openProductCard(article, name, brand, price, subcategory) {
            var productData = { name: name, article: article, brand: brand, price: price, subcategory: subcategory };
            var jsonStr = JSON.stringify(productData);
            var encodedData = btoa(unescape(encodeURIComponent(jsonStr)));
            var cardUrl = CARD_BASE_URL + "?data=" + encodeURIComponent(encodedData);
            WebApp.openLink(cardUrl);
        }

        function displayProducts(products) {
            var container = document.getElementById("productsList");
            if (products.length === 0) {
                container.innerHTML = '<div class="no-results">😔 Товары не найдены</div>';
                return;
            }
            container.innerHTML = "";
            for (var i = 0; i < products.length; i++) {
                var p = products[i];
                var card = document.createElement("div");
                card.className = "product-card";
                card.onclick = (function(article, name, brand, price, subcategory) {
                    return function() { openProductCard(article, name, brand, price, subcategory); };
                })(p.article, p.name, p.brand, p.price, p.subcategory);
                card.innerHTML = '<div class="product-name">' + escapeHtml(p.name.substring(0, 100)) + '</div>' +
                    '<div class="product-price">' + formatPrice(p.price) + '</div>' +
                    '<div class="product-article">🔢 Артикул: ' + p.article + '</div>' +
                    '<div class="product-article">🏷 Бренд: ' + p.brand + '</div>' +
                    '<div class="product-subcategory">📂 ' + p.subcategory + '</div>';
                container.appendChild(card);
            }
        }

        function escapeHtml(text) {
            if (!text) return "";
            return text.replace(/[&<>]/g, function(m) {
                if (m === "&") return "&amp;";
                if (m === "<") return "&lt;";
                if (m === ">") return "&gt;";
                return m;
            });
        }

        document.getElementById("searchInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") searchProducts();
        });

        loadProducts();
    </script>
</body>
</html>
