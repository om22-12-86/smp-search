        function loadProducts() {
            allProducts = productsData;
            console.log("✅ Загружено товаров:", allProducts.length);
            
            if (allProducts.length === 0) {
                document.getElementById("productsList").innerHTML = "<div class="error">📭 Товары не найдены</div>";
                return;
            }
            
            uniqueSubcategories = [...new Set(allProducts.map(p => p.subcategory))];
            const filtersDiv = document.getElementById("filters");
            filtersDiv.innerHTML = "<div class="filter-chip active" onclick="setFilter('all')">📦 Все категории</div>";
            uniqueSubcategories.forEach(cat => {
                filtersDiv.innerHTML += "<div class="filter-chip" onclick="setFilter('" + cat.replace(/'/g, "\'") + "')">" + cat + "</div>";
            });
            searchProducts();
        }

        function setFilter(category) {
            currentSubcategory = category;
            document.querySelectorAll(".filter-chip").forEach(chip => {
                chip.classList.remove("active");
                if (chip.innerText === (category === "all" ? "📦 Все категории" : category)) {
                    chip.classList.add("active");
                }
            });
            searchProducts();
        }

        function searchProducts() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            let filtered = [...allProducts];
            if (currentSubcategory !== "all") {
                filtered = filtered.filter(p => p.subcategory === currentSubcategory);
            }
            if (query) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(query) || p.brand.toLowerCase().includes(query) || p.article.includes(query));
            }
            displayProducts(filtered);
            document.getElementById("stats").innerHTML = "🔍 Найдено: " + filtered.length + " товаров из " + allProducts.length;
        }

        function formatPrice(price) { 
            const p = parseInt(price); 
            return isNaN(p) ? price : p.toLocaleString("ru-RU") + " ₽"; 
        }

        function openProductCard(article, name, brand, price, subcategory) {
            const productData = { name: name, article: article, brand: brand, price: price, subcategory: subcategory };
            const jsonStr = JSON.stringify(productData);
            const encodedData = btoa(unescape(encodeURIComponent(jsonStr)));
            const cardUrl = CARD_BASE_URL + "?data=" + encodeURIComponent(encodedData);
            WebApp.openLink(cardUrl);
        }

        function displayProducts(products) {
            const container = document.getElementById("productsList");
            if (products.length === 0) { 
                container.innerHTML = "<div class="no-results">😔 Товары не найдены</div>"; 
                return; 
            }
            container.innerHTML = "";
            products.forEach(p => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.onclick = () => openProductCard(p.article, p.name, p.brand, p.price, p.subcategory);
                card.innerHTML = "<div class="product-name">" + escapeHtml(p.name.substring(0, 100)) + "</div>" +
                    "<div class="product-price">" + formatPrice(p.price) + "</div>" +
                    "<div class="product-article">🔢 Артикул: " + p.article + "</div>" +
                    "<div class="product-article">🏷 Бренд: " + p.brand + "</div>" +
                    "<div class="product-subcategory">📂 " + p.subcategory + "</div>";
                container.appendChild(card);
            });
        }

        function escapeHtml(text) { 
            if (!text) return "";
            return text.replace(/[&<>]/g, function(m) {
                if (m === "&") return "&amp;";
                if (m === "<") return "&lt;";
                if (m === ">") return "&gt;";
                return m;
            });
        }

        document.getElementById("searchInput").addEventListener("keypress", function(e) { 
            if (e.key === "Enter") searchProducts(); 
        });
        
        loadProducts();
    </script>
