<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test API SMP Laptops</title>
</head>
<body>
    <h1>Тест API товаров</h1>
    <div id="result">Загрузка...</div>
    
    <script>
        const API_URL = 'https://knock-civil-threshold-operating.trycloudflare.com/products';
        
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            try {
                console.log('Загрузка с:', API_URL);
                const response = await fetch(API_URL);
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = '<span style="color:green">✅ Успех! Загружено ' + data.length + ' товаров</span>';
                    resultDiv.innerHTML += '<br>Первый товар: ' + (data[0]?.name || 'нет');
                } else {
                    resultDiv.innerHTML = '<span style="color:red">❌ Ошибка HTTP: ' + response.status + '</span>';
                }
            } catch(e) {
                resultDiv.innerHTML = '<span style="color:red">❌ Ошибка: ' + e.message + '</span>';
            }
        }
        
        testAPI();
    </script>
</body>
</html>
