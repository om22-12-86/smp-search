<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Карточка товара SMP</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
        }
        .product-card { max-width: 500px; margin: 0 auto; }
        .product-name { font-size: 22px; font-weight: bold; margin-bottom: 12px; line-height: 1.3; }
        .product-price { font-size: 28px; font-weight: bold; color: var(--tg-theme-button-color, #2b82d6); margin-bottom: 16px; }
        .product-article, .product-brand, .product-subcategory, .product-stock {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666666);
            margin-bottom: 8px;
            padding: 4px 0;
            border-bottom: 1px solid var(--tg-theme-hint-color, #e0e0e0);
        }
        .product-description {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
        }
        .product-characteristics {
            font-size: 13px;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            white-space: pre-wrap;
        }
        .product-image {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 16px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }
        .order-button {
            width: 100%;
            padding: 16px;
            background: var(--tg-theme-button-color, #2b82d6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 20px;
        }
        .order-button:active { opacity: 0.8; }
        .loading, .error { text-align: center; padding: 50px; color: var(--tg-theme-hint-color, #666666); }
        .error { color: #ff3b30; }
    </style>
</head>
<body>
    <div id="app" class="loading">📦 Загрузка товара...</div>
    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();
        WebApp.expand();
        const BOT_USERNAME = 'BotWork1_bot';

        function showError(message) {
            document.getElementById('app').innerHTML = '<div class="error">❌ ' + message + '<br><br>🔄 <a href="#" onclick="location.reload()">Попробовать снова</a></div>';
        }

        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function formatPrice(price) {
            const p = parseInt(price);
            if (isNaN(p)) return price;
            return p.toLocaleString('ru-RU') + ' ₽';
        }

        // Получаем данные из URL параметра 'data'
        const urlParams = new URLSearchParams(window.location.search);
        let product = null;

        if (urlParams.has('data')) {
            try {
                let encodedData = urlParams.get('data');
                encodedData = decodeURIComponent(encodedData);
                const jsonStr = atob(encodedData);
                product = JSON.parse(jsonStr);
                console.log('✅ Данные получены:', product);
            } catch(e) {
                console.error('Ошибка декодирования:', e);
                showError('Не удалось загрузить данные о товаре');
            }
        } else {
            showError('Ссылка на товар повреждена');
        }

        if (product && product.name) {
            let html = '<div class="product-card">';

            // Фото товара - берём первую ссылку
            if (product.image_url && product.image_url !== '') {
                let images = product.image_url.split(',');
                for (let i = 0; i < images.length && i < 1; i++) {
                    let imgUrl = images[i].trim();
                    if (imgUrl && imgUrl !== '' && imgUrl.startsWith('http')) {
                        html += '<img class="product-image" src="' + imgUrl + '" alt="Фото товара" onerror="this.style.display=\'none\'">';
                        break;
                    }
                }
            }
            
            // Название
            html += '<div class="product-name">' + escapeHtml(product.name) + '</div>';
            
            // Цена
            html += '<div class="product-price">' + formatPrice(product.price) + '</div>';
            
            // Артикул
            if (product.article) {
                html += '<div class="product-article">🔢 Артикул: ' + escapeHtml(product.article) + '</div>';
            }
            
            // Бренд
            if (product.brand) {
                html += '<div class="product-brand">🏷 Бренд: ' + escapeHtml(product.brand) + '</div>';
            }
            
            // Категория
            if (product.subcategory) {
                html += '<div class="product-subcategory">📂 Категория: ' + escapeHtml(product.subcategory) + '</div>';
            }
            
            // Наличие
            if (product.stock && product.stock !== '0') {
                html += '<div class="product-stock">📦 В наличии: ' + product.stock + ' шт.</div>';
            } else {
                html += '<div class="product-stock">⏳ Под заказ (1-3 дня)</div>';
            }
            
            // Описание
            if (product.description && product.description !== '') {
                html += '<div class="product-description">📝 ' + escapeHtml(product.description) + '</div>';
            }
            
            // Характеристики
            if (product.characteristics && product.characteristics !== '') {
                html += '<div class="product-characteristics">🔧 Характеристики:<br>' + escapeHtml(product.characteristics) + '</div>';
            }
            
            // Кнопка заказа
            html += '<button class="order-button" onclick="orderProduct()">📦 Заказать</button>';
            html += '</div>';
            
            document.getElementById('app').innerHTML = html;
            
            WebApp.MainButton.setText('📦 Заказать');
            WebApp.MainButton.onClick(function() { orderProduct(); });
            WebApp.MainButton.show();
        } else if (product && !product.name) {
            showError('Неверный формат данных товара');
        } else {
            showError('Данные товара не найдены');
        }

        function orderProduct() {
            const productName = document.querySelector('.product-name')?.innerText || 'товар';
            const article = document.querySelector('.product-article')?.innerText.replace('🔢 Артикул: ', '') || '';
            const message = 'Здравствуйте! Хочу заказать: ' + productName + ' (артикул: ' + article + ')';
            WebApp.openTelegramLink('https://t.me/' + BOT_USERNAME + '?text=' + encodeURIComponent(message));
        }
    </script>
</body>
</html>
