<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара - SMP Laptops</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
        }
        .product-card { max-width: 500px; margin: 0 auto; }
        .product-name { font-size: 22px; font-weight: bold; margin-bottom: 12px; line-height: 1.3; }
        .product-price { font-size: 28px; font-weight: bold; color: var(--tg-theme-button-color, #2b82d6); margin-bottom: 16px; }
        .product-article, .product-brand, .product-subcategory, .product-stock {
            font-size: 14px; color: var(--tg-theme-hint-color, #666666); margin-bottom: 8px;
        }
        .product-description, .product-characteristics {
            font-size: 14px; line-height: 1.5; margin: 16px 0; padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0); border-radius: 12px;
        }
        .product-image { width: 100%; max-height: 300px; object-fit: contain; border-radius: 12px; margin-bottom: 16px; background: #f0f0f0; }
        .order-button {
            width: 100%; padding: 16px; background: var(--tg-theme-button-color, #2b82d6);
            color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: opacity 0.2s;
        }
        .order-button:active { opacity: 0.8; }
        .loading, .error { text-align: center; padding: 40px; }
        .error { color: red; }
    </style>
</head>
<body>
    <div id="app" class="loading">📦 Загрузка товара...</div>

    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();
        WebApp.expand();

        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            if (!urlParams.has('data')) {
                showError('Ссылка повреждена');
                return;
            }

            try {
                const encoded = urlParams.get('data');
                const jsonStr = atob(decodeURIComponent(encoded));
                const product = JSON.parse(jsonStr);

                let html = `<div class="product-card">`;

                if (product.image_url) {
                    const firstImage = product.image_url.split(',')[0].trim();
                    html += `<img class="product-image" src="${firstImage}" alt="Фото товара" onerror="this.style.display='none'">`;
                }

                html += `<div class="product-name">${escapeHtml(product.name || 'Без названия')}</div>`;
                html += `<div class="product-price">${formatPrice(product.price)} ₽</div>`;
                html += `<div class="product-article">Артикул: ${escapeHtml(product.article || '—')}</div>`;
                html += `<div class="product-brand">Бренд: ${escapeHtml(product.brand || 'Другие')}</div>`;
                html += `<div class="product-subcategory">Категория: ${escapeHtml(product.subcategory || '—')}</div>`;
                html += `<div class="product-stock">${parseInt(product.stock) > 0 ? '✓ В наличии: ' + product.stock + ' шт.' : '✗ Нет в наличии'}</div>`;

                if (product.description) {
                    html += `<div class="product-description">${escapeHtml(product.description)}</div>`;
                }
                if (product.characteristics) {
                    html += `<div class="product-characteristics">${escapeHtml(product.characteristics)}</div>`;
                }

                html += `<button class="order-button" onclick="orderProduct('${product.article}', '${escapeHtml(product.name)}')">📦 Заказать</button>`;
                html += `</div>`;

                document.getElementById('app').innerHTML = html;

            } catch(e) {
                console.error(e);
                showError('Ошибка загрузки данных');
            }
        }

        function formatPrice(price) {
            const num = parseInt(String(price || '0').replace(/[^0-9]/g, ''));
            return isNaN(num) ? price : num.toLocaleString('ru-RU');
        }

        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function orderProduct(article, name) {
            const text = `Здравствуйте! Хочу заказать: ${name} (артикул: ${article})`;
            WebApp.openTelegramLink(`https://t.me/BotWork1_bot?text=${encodeURIComponent(text)}`);
        }

        function showError(msg) {
            document.getElementById('app').innerHTML = `<div class="error">❌ ${msg}</div>`;
        }

        loadProduct();
    </script>
</body>
</html>
