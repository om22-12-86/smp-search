<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара - Техно-Альянс</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; padding: 16px; }
        .product-card { background: white; border-radius: 16px; padding: 20px; }
        .product-name { font-size: 20px; font-weight: bold; margin-bottom: 12px; }
        .product-price { font-size: 28px; font-weight: bold; color: #e53935; margin-bottom: 16px; }
        .product-article, .product-brand, .product-subcategory { font-size: 14px; color: #666; margin-bottom: 8px; }
        .order-button { width: 100%; padding: 16px; background: #0088cc; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 16px; }
        .loading { text-align: center; padding: 40px; }
        .error { color: red; text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div id="app" class="loading">📦 Загрузка...</div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        
        const API_URL = 'https://signals-filme-shakira-wife.trycloudflare.com/products';
        const BOT_USERNAME = 'BotWork1_bot';
        
        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const article = urlParams.get('article');
            if (!article) { showError('Товар не найден'); return; }
            try {
                const response = await fetch(API_URL);
                const products = await response.json();
                const product = products.find(p => p.article === article);
                if (!product) { showError('Товар не найден'); return; }
                displayProduct(product);
            } catch(e) { showError('Ошибка загрузки'); }
        }
        
        function displayProduct(p) {
            document.getElementById('app').innerHTML = `
                <div class="product-card">
                    <div class="product-name">${escapeHtml(p.name)}</div>
                    <div class="product-price">${formatPrice(p.price)} ₽</div>
                    <div class="product-article">Артикул: ${escapeHtml(p.article)}</div>
                    <div class="product-brand">Бренд: ${escapeHtml(p.brand)}</div>
                    <div class="product-subcategory">Категория: ${escapeHtml(p.subcategory)}</div>
                    <button class="order-button" onclick="orderProduct('${escapeHtml(p.article)}', '${escapeHtml(p.name)}')">📦 Заказать</button>
                </div>
            `;
        }
        
        function orderProduct(article, name) {
            tg.openTelegramLink(`https://t.me/${BOT_USERNAME}?text=Здравствуйте! Хочу заказать: ${name} (артикул: ${article})`);
            tg.close();
        }
        
        function formatPrice(price) { let num = parseInt(String(price).replace(/[^0-9]/g, '')); return isNaN(num) ? price : num.toLocaleString('ru-RU'); }
        function escapeHtml(text) { if (!text) return ''; return String(text).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]); }
        function showError(msg) { document.getElementById('app').innerHTML = `<div class="error">❌ ${msg}</div>`; }
        loadProduct();
    </script>
</body>
</html>
