<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Карточка товара - SMP Laptops</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; padding: 16px; }
        .product-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .product-image { width: 100%; height: auto; background: #f0f0f0; max-height: 300px; object-fit: contain; }
        .product-info { padding: 20px; }
        .product-name { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #1a1a1a; }
        .product-article { font-size: 13px; color: #666; margin-bottom: 12px; }
        .product-brand { display: inline-block; background: #e3f2fd; color: #1976d2; padding: 4px 12px; border-radius: 16px; font-size: 12px; margin-bottom: 16px; }
        .product-price { font-size: 26px; font-weight: 700; color: #e53935; margin-bottom: 16px; }
        .product-stock { color: #4caf50; font-weight: 500; margin-bottom: 16px; font-size: 14px; }
        .product-description { color: #555; line-height: 1.5; margin-bottom: 20px; font-size: 14px; }
        .buy-button { background: #0088cc; color: white; border: none; padding: 14px 24px; border-radius: 12px; font-size: 16px; font-weight: 600; width: 100%; cursor: pointer; }
        .buy-button:active { transform: scale(0.98); }
        .error, .loading { text-align: center; padding: 40px; color: #666; }
        .error { color: #e53935; }
    </style>
</head>
<body>
    <div id="content" class="loading">📦 Загрузка товара...</div>
    <script>
        let tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); tg.setBackgroundColor('#f5f5f5'); }
        
        const urlParams = new URLSearchParams(window.location.search);
        let productData = urlParams.get('data');
        
        if (productData) {
            try {
                let product;
                try { product = JSON.parse(decodeURIComponent(productData)); }
                catch(e) { product = JSON.parse(atob(decodeURIComponent(productData))); }
                displayProduct(product);
            } catch(e) {
                document.getElementById('content').innerHTML = `<div class="error">❌ Ошибка: ${e.message}</div>`;
            }
        } else {
            document.getElementById('content').innerHTML = '<div class="error">❌ Товар не найден</div>';
        }
        
        function displayProduct(product) {
            const images = product.image_url ? product.image_url.split(',').map(u => u.trim()).filter(u => u.startsWith('http')) : [];
            const mainImage = images[0] || '';
            
            const html = `
                <div class="product-card">
                    ${mainImage ? `<img class="product-image" src="${mainImage}" alt="${escapeHtml(product.name)}" onerror="this.style.display='none'">` : ''}
                    <div class="product-info">
                        <div class="product-name">${escapeHtml(product.name)}</div>
                        <div class="product-article">Артикул: ${product.article || '—'}</div>
                        <div class="product-brand">${escapeHtml(product.brand) || 'Другие'}</div>
                        <div class="product-price">${formatPrice(product.price)} ₽</div>
                        <div class="product-stock">${parseInt(product.stock) > 0 ? '✓ В наличии: ' + product.stock + ' шт.' : '✗ Нет в наличии'}</div>
                        <div class="product-description">${escapeHtml(product.description || 'Описание отсутствует')}</div>
                        <button class="buy-button" onclick="orderProduct()">📦 Заказать</button>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }
        
        function orderProduct() {
            if (tg) { tg.sendData(JSON.stringify({ action: 'order' })); tg.close(); }
            else { alert('Пожалуйста, откройте через Telegram'); }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function formatPrice(price) {
            let num = parseInt(String(price || '0').replace(/[^0-9]/g, ''));
            if (isNaN(num)) return price || '0';
            return num.toLocaleString('ru-RU');
        }
    </script>
</body>
</html>
